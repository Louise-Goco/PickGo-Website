<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Customers - PickGo Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header-section { margin-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .header-section h1 { font-size: 32px; font-weight: 700; color: #0f172a; margin: 0; }
        .header-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .btn-add { background: #f97316; color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .search-box { position: relative; width: 300px; }
        .search-box input { width: 100%; padding: 12px 16px 12px 44px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; outline: none; box-sizing: border-box; }
        .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .table-container { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 16px 24px; font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        td { padding: 16px 24px; border-top: 1px solid #f1f5f9; font-size: 14px; color: #334155; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #64748b; font-size: 12px; }
        .user-details h4 { margin: 0; font-size: 14px; font-weight: 600; color: #0f172a; }
        .user-details p { margin: 0; font-size: 13px; color: #64748b; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: capitalize; }
        .status-badge.active { background: #dcfce7; color: #15803d; }
        .status-badge.suspended { background: #fef9c3; color: #854d0e; }
        .status-badge.deactivated { background: #fee2e2; color: #b91c1c; }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-action { padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; background: #fff; }
        .btn-edit { color: #0ea5e9; }
        .btn-delete { color: #ef4444; }
        .alert { padding: 16px; border-radius: 12px; margin-bottom: 24px; font-size: 14px; font-weight: 500; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); overflow-y: auto; padding: 40px 0; }
        .modal-content { background: #fff; margin: 0 auto; padding: 32px; width: 450px; max-width: 95%; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative; }
        .modal-header h2 { font-size: 24px; font-weight: 700; color: #0f172a; margin: 0 0 24px 0; }
        .close-modal { position: absolute; right: 24px; top: 24px; cursor: pointer; color: #94a3b8; font-size: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 14px; background: #0f172a; color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .empty-state { padding: 60px; text-align: center; color: #64748b; }
    </style>
</head>
<body>
    <div id="admin-nav-root"></div>
    <div class="dashboard-container">
        <div class="header-section">
            <div>
                <h1>Customer Management</h1>
                <p style="color: #64748b; margin-top: 4px;">Monitor and manage customer account statuses.</p>
            </div>
            <div class="header-actions">
                <form id="search-form" class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search customers...">
                </form>
                <button type="button" class="btn-add" id="btn-add-customer">+ Add Customer</button>
            </div>
        </div>

        <div id="alert-box" style="display:none;"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Phone Number</th>
                        <th>Joined Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customers-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="customerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle">Add New Customer</h2>
            </div>
            <form id="customerForm">
                <input type="hidden" id="formUserId">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="last_name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone_number" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Password</label>
                    <input type="password" id="password">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Create Customer</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { requireAdmin } from '../js/guard.js';
        import { renderAdminNav } from '../js/nav-admin.js';
        import { getAll, addRecord, updateRecord, deleteRecord } from '../js/db.js';
        import { hashPassword } from '../js/bcrypt-util.js';
        import { escapeHtml, showAlert, getQueryParam, nowIso, formatDate } from '../js/utils.js';

        const ctx = await requireAdmin();
        if (!ctx) throw new Error('Unauthorized');
        await renderAdminNav();

        const modal = document.getElementById('customerModal');
        const form = document.getElementById('customerForm');
        let customers = [];
        let formMode = 'create';

        function openAddModal() {
            formMode = 'create';
            document.getElementById('modalTitle').textContent = 'Add New Customer';
            document.getElementById('submitBtn').textContent = 'Create Customer';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('password').required = true;
            form.reset();
            document.getElementById('formUserId').value = '';
            modal.style.display = 'block';
        }

        function openEditModal(user) {
            formMode = 'update';
            document.getElementById('modalTitle').textContent = 'Edit Customer';
            document.getElementById('submitBtn').textContent = 'Save Changes';
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('password').required = false;
            document.getElementById('formUserId').value = user._id;
            document.getElementById('first_name').value = user.first_name || '';
            document.getElementById('last_name').value = user.last_name || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('phone_number').value = user.phone_number || '';
            modal.style.display = 'block';
        }

        function filterCustomers(list, q) {
            if (!q) return list;
            const s = q.toLowerCase();
            return list.filter((c) =>
                (c.first_name || '').toLowerCase().includes(s) ||
                (c.last_name || '').toLowerCase().includes(s) ||
                (c.email || '').toLowerCase().includes(s)
            );
        }

        function renderTable(list) {
            const tbody = document.getElementById('customers-tbody');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No customers found matching your search.</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = list.map((c) => {
                const initials = ((c.first_name || '')[0] || '') + ((c.last_name || '')[0] || '');
                const st = c.account_status || 'active';
                return `<tr>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${escapeHtml(initials.toUpperCase())}</div>
                            <div class="user-details">
                                <h4>${escapeHtml((c.first_name || '') + ' ' + (c.last_name || ''))}</h4>
                                <p>${escapeHtml(c.email || '')}</p>
                            </div>
                        </div>
                    </td>
                    <td>${escapeHtml(c.phone_number || '')}</td>
                    <td>${escapeHtml(formatDate(c.created_at, { hour: undefined, minute: undefined }))}</td>
                    <td><span class="status-badge ${escapeHtml(st)}">${escapeHtml(st)}</span></td>
                    <td>
                        <div class="actions">
                            <button type="button" class="btn-action btn-edit" data-edit="${escapeHtml(c._id)}">Edit</button>
                            ${st !== 'active' ? `<button type="button" class="btn-action" data-action="activate" data-id="${escapeHtml(c._id)}">Activate</button>` : ''}
                            ${st === 'active' ? `<button type="button" class="btn-action" data-action="suspend" data-id="${escapeHtml(c._id)}">Suspend</button>` : ''}
                            <button type="button" class="btn-action btn-delete" data-action="delete" data-id="${escapeHtml(c._id)}">Delete</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            tbody.querySelectorAll('[data-edit]').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const u = customers.find((x) => x._id === btn.dataset.edit);
                    if (u) openEditModal(u);
                });
            });
            tbody.querySelectorAll('[data-action]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const action = btn.dataset.action;
                    if (action === 'delete' && !confirm('Are you sure you want to delete this customer?')) return;
                    try {
                        if (action === 'delete') {
                            await deleteRecord('users', id);
                            showAlert('alert-box', 'Customer deleted successfully!', 'success');
                        } else if (action === 'activate') {
                            await updateRecord('users', id, { account_status: 'active' });
                            showAlert('alert-box', 'Account status updated to active', 'success');
                        } else if (action === 'suspend') {
                            await updateRecord('users', id, { account_status: 'suspended' });
                            showAlert('alert-box', 'Account status updated to suspended', 'success');
                        }
                        await refresh();
                    } catch (e) {
                        showAlert('alert-box', 'Action failed.', 'error');
                    }
                });
            });
        }

        async function refresh() {
            const all = await getAll('users');
            customers = all.filter((u) => u.user_type === 'customer');
            customers.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
            const q = document.getElementById('search-input').value.trim();
            renderTable(filterCustomers(customers, q));
        }

        document.getElementById('btn-add-customer').addEventListener('click', openAddModal);
        document.getElementById('close-modal').addEventListener('click', () => { modal.style.display = 'none'; });
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            renderTable(filterCustomers(customers, document.getElementById('search-input').value.trim()));
        });
        document.getElementById('search-input').addEventListener('input', () => {
            renderTable(filterCustomers(customers, document.getElementById('search-input').value.trim()));
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fname = document.getElementById('first_name').value.trim();
            const lname = document.getElementById('last_name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone_number').value.trim();
            try {
                if (formMode === 'create') {
                    const pwd = document.getElementById('password').value;
                    if (!pwd) {
                        showAlert('alert-box', 'Password is required.', 'error');
                        return;
                    }
                    const hashed = await hashPassword(pwd);
                    await addRecord('users', {
                        first_name: fname,
                        last_name: lname,
                        email,
                        phone_number: phone,
                        password: hashed,
                        user_type: 'customer',
                        account_status: 'active',
                        is_verified: false,
                        created_at: nowIso(),
                    });
                    showAlert('alert-box', 'Customer created successfully!', 'success');
                } else {
                    const id = document.getElementById('formUserId').value;
                    await updateRecord('users', id, {
                        first_name: fname,
                        last_name: lname,
                        email,
                        phone_number: phone,
                    });
                    showAlert('alert-box', 'Customer details updated successfully!', 'success');
                }
                modal.style.display = 'none';
                await refresh();
            } catch (err) {
                showAlert('alert-box', 'Error saving customer: ' + (err.message || 'Unknown error'), 'error');
            }
        });

        const initialSearch = getQueryParam('search');
        if (initialSearch) document.getElementById('search-input').value = initialSearch;
        await refresh();
    </script>
</body>
</html>
