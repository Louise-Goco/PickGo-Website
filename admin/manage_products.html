<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .page-header { margin-top: 40px; margin-bottom: 32px; }
        .data-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .data-table th { background: #f8fafc; padding: 16px; text-align: left; font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .data-table td { padding: 16px; border-top: 1px solid #f1f5f9; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-pending { background: #fef9c3; color: #854d0e; }
        .badge-available { background: #f0fdf4; color: #166534; }
        .badge-rejected { background: #fef2f2; color: #991b1b; }
        .action-btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
        .btn-approve { background: #10b981; color: #fff; }
        .btn-reject { background: #ef4444; color: #fff; }
        .product-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #f1f5f9; }
        .alert { padding: 16px; border-radius: 12px; margin-bottom: 24px; font-size: 14px; font-weight: 500; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
    </style>
</head>
<body>
    <div id="admin-nav-root"></div>
    <div class="admin-container">
        <div class="page-header">
            <h1 style="font-size: 28px; font-weight: 700; color: #0f172a;">Product Management</h1>
            <p style="color: #64748b;">Review and moderate product submissions from merchants.</p>
        </div>

        <div id="alert-box" style="display:none;"></div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Merchant</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Date Added</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products-tbody"></tbody>
        </table>
    </div>

    <script type="module">
        import { requireAdmin } from '../js/guard.js';
        import { renderAdminNav } from '../js/nav-admin.js';
        import { getItemsWithMerchants, getAll, updateRecord } from '../js/db.js';
        import { escapeHtml, showAlert, formatMoney, formatDate, imgUrl } from '../js/utils.js';

        const ctx = await requireAdmin();
        if (!ctx) throw new Error('Unauthorized');
        await renderAdminNav();

        const categories = await getAll('categories');
        const catMap = Object.fromEntries(categories.map((c) => [String(c._id || c.Categ_Id), c.Categ_Name]));

        async function loadProducts() {
            const products = await getItemsWithMerchants();
            products.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
            const tbody = document.getElementById('products-tbody');
            if (!products.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#94a3b8;">No products found.</td></tr>';
                return;
            }
            tbody.innerHTML = products.map((p) => {
                const id = p._id || p.Item_Id;
                const st = p.Item_Status || 'pending';
                const catName = catMap[String(p.Item_Category)] || '—';
                const desc = (p.Item_Description || '').slice(0, 40);
                const img = imgUrl(p.Item_Image, '../placeholder.png');
                const actions = st === 'pending' ? `
                    <div style="display:flex;gap:8px;">
                        <button type="button" class="action-btn btn-approve" data-action="approve" data-id="${escapeHtml(id)}">Approve</button>
                        <button type="button" class="action-btn btn-reject" data-action="reject" data-id="${escapeHtml(id)}">Reject</button>
                    </div>` : '';
                return `<tr>
                    <td style="display:flex;align-items:center;gap:12px;">
                        <img src="${escapeHtml(img)}" class="product-img" alt="">
                        <div>
                            <div style="font-weight:600;">${escapeHtml(p.Item_Name||'')}</div>
                            <div style="font-size:12px;color:#94a3b8;">${escapeHtml(desc)}${desc.length >= 40 ? '...' : ''}</div>
                        </div>
                    </td>
                    <td>${escapeHtml(p.Merch_Name||'')}</td>
                    <td>${escapeHtml(catName)}</td>
                    <td style="font-weight:700;">${formatMoney(p.Item_Price)}</td>
                    <td><span class="badge badge-${escapeHtml(st)}">${escapeHtml(st.replace(/_/g,' '))}</span></td>
                    <td>${escapeHtml(formatDate(p.created_at, { hour: undefined, minute: undefined }))}</td>
                    <td>${actions}</td>
                </tr>`;
            }).join('');

            tbody.querySelectorAll('[data-action]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const status = btn.dataset.action === 'approve' ? 'available' : 'rejected';
                    try {
                        await updateRecord('items', btn.dataset.id, { Item_Status: status });
                        showAlert('alert-box', `Product ${btn.dataset.action === 'approve' ? 'approved' : 'rejected'} successfully!`, 'success');
                        await loadProducts();
                    } catch (e) {
                        showAlert('alert-box', 'Error updating product.', 'error');
                    }
                });
            });
        }

        await loadProducts();
    </script>
</body>
</html>
