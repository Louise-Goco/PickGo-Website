<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Riders - PickGo Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .header-section { margin-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .header-section h1 { font-size: 32px; font-weight: 700; color: #0f172a; margin: 0; }
        .search-box { position: relative; width: 350px; }
        .search-box input { width: 100%; padding: 12px 16px 12px 44px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 14px; outline: none; box-sizing: border-box; }
        .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .table-container { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th { background: #f8fafc; padding: 16px 24px; font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        td { padding: 16px 24px; border-top: 1px solid #f1f5f9; font-size: 14px; color: #334155; }
        .rider-info { display: flex; align-items: center; gap: 12px; }
        .rider-avatar { width: 40px; height: 40px; border-radius: 50%; background: #0f172a; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 14px; }
        .vehicle-tag { display: inline-block; padding: 4px 10px; background: #f1f5f9; border-radius: 6px; font-size: 12px; font-weight: 600; color: #475569; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-badge.active { background: #dcfce7; color: #15803d; }
        .status-badge.pending { background: #fef9c3; color: #854d0e; }
        .status-badge.suspended { background: #fee2e2; color: #b91c1c; }
        .status-badge.rejected { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .verified-badge { display: inline-flex; align-items: center; gap: 4px; color: #0ea5e9; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-action { padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; background: #fff; }
        .btn-edit { color: #0ea5e9; }
        .btn-delete { color: #ef4444; }
        .alert { padding: 16px; border-radius: 12px; margin-bottom: 24px; font-size: 14px; font-weight: 500; }
        .alert-error { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); overflow-y: auto; padding: 40px 0; }
        .modal-content { background: #fff; margin: 0 auto; padding: 32px; width: 500px; max-width: 95%; border-radius: 20px; position: relative; }
        .close-modal { position: absolute; right: 24px; top: 24px; cursor: pointer; color: #94a3b8; font-size: 28px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 14px; background: #0f172a; color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .empty-state { padding: 80px; text-align: center; color: #64748b; }
    </style>
</head>
<body>
    <div id="admin-nav-root"></div>
    <div class="dashboard-container">
        <div class="header-section">
            <div>
                <h1>Rider Management</h1>
                <p style="color: #64748b; margin-top: 4px;">Approve riders and monitor delivery fleet performance.</p>
            </div>
            <form id="search-form" class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Search by name, email, or plate...">
            </form>
        </div>

        <div id="alert-box" style="display:none;"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Rider Details</th>
                        <th>Vehicle / Documents</th>
                        <th>Status</th>
                        <th>Performance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="riders-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="riderModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <h2 style="font-size:24px;font-weight:700;margin:0 0 24px 0;">Edit Rider Details</h2>
            <form id="riderForm">
                <input type="hidden" id="formRiderId">
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" id="fname" required></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="lname" required></div>
                </div>
                <div class="form-group"><label>Email Address</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Phone Number</label><input type="text" id="phone" required></div>
                <hr style="border:0;border-top:1px solid #f1f5f9;margin:24px 0;">
                <div class="form-row">
                    <div class="form-group">
                        <label>Vehicle Type</label>
                        <select id="vehicle_type">
                            <option value="Motorcycle">Motorcycle</option>
                            <option value="Bicycle">Bicycle</option>
                            <option value="Car">Car</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Plate Number</label><input type="text" id="plate_number" required></div>
                </div>
                <div class="form-group"><label>License Number</label><input type="text" id="license_number" required></div>
                <button type="submit" class="btn-submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { requireAdmin } from '../js/guard.js';
        import { renderAdminNav } from '../js/nav-admin.js';
        import { getAll, updateRecord, deleteRecord } from '../js/db.js';
        import { escapeHtml, showAlert, docViewButton, initDocViewer } from '../js/utils.js';

        const ctx = await requireAdmin();
        if (!ctx) throw new Error('Unauthorized');
        await renderAdminNav();
        initDocViewer();

        const modal = document.getElementById('riderModal');
        let riders = [];

        function docLink(path, label) {
            return docViewButton(path, label);
        }

        function filterRows(list, q) {
            if (!q) return list;
            const s = q.toLowerCase();
            return list.filter((r) =>
                (r.Rider_Fname || '').toLowerCase().includes(s) ||
                (r.Rider_Lname || '').toLowerCase().includes(s) ||
                (r.Rider_Email || '').toLowerCase().includes(s) ||
                (r.Rider_PlateNumber || '').toLowerCase().includes(s)
            );
        }

        function renderTable(list) {
            const tbody = document.getElementById('riders-tbody');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No rider applications found.</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = list.map((rider) => {
                const initials = ((rider.Rider_Fname || '')[0] || '') + ((rider.Rider_Lname || '')[0] || '');
                const st = rider.Rider_Status || 'pending';
                const rid = rider._id;
                const verified = rider.Rider_Verified === true || rider.Rider_Verified === 1;
                let docs = docLink(rider.Rider_LicensePhoto, 'License') +
                    docLink(rider.Rider_NBI, 'NBI Clearance') +
                    docLink(rider.Rider_OR, 'OR') +
                    docLink(rider.Rider_CR, 'CR');

                let actions = `<button type="button" class="btn-action btn-edit" data-edit="${escapeHtml(rid)}">Edit</button>`;
                if (!verified) actions += `<button type="button" class="btn-action" data-action="verify" data-id="${escapeHtml(rid)}">Verify</button>`;
                if (st === 'pending') {
                    actions += `<button type="button" class="btn-action" style="background:#0f172a;color:#fff;border:none;" data-action="approve" data-id="${escapeHtml(rid)}">Approve</button>`;
                    actions += `<button type="button" class="btn-action btn-delete" data-action="reject" data-id="${escapeHtml(rid)}">Reject</button>`;
                } else if (st === 'active') {
                    actions += `<button type="button" class="btn-action btn-delete" data-action="suspend" data-id="${escapeHtml(rid)}">Suspend</button>`;
                } else {
                    actions += `<button type="button" class="btn-action" data-action="activate" data-id="${escapeHtml(rid)}">Activate</button>`;
                }
                actions += `<button type="button" class="btn-action btn-delete" data-action="delete" data-id="${escapeHtml(rid)}">Delete</button>`;

                return `<tr>
                    <td><div class="rider-info"><div class="rider-avatar">${escapeHtml(initials.toUpperCase())}</div>
                        <div><h4 style="margin:0;font-size:14px;">${escapeHtml((rider.Rider_Fname||'')+' '+(rider.Rider_Lname||''))}</h4>
                        <p style="margin:0;font-size:13px;color:#64748b;">${escapeHtml(rider.Rider_Email||'')}</p>
                        <p style="margin:0;font-size:12px;">${escapeHtml(rider.Rider_Phone||'')}</p></div></div></td>
                    <td><div class="vehicle-tag">${escapeHtml(rider.Rider_VehicleType||'')}</div>
                        <div style="font-size:13px;font-weight:700;margin-top:4px;">${escapeHtml(rider.Rider_PlateNumber||'')}</div>
                        <div style="margin-top:8px;">${docs}</div>
                        ${verified ? '<div class="verified-badge" style="margin-top:6px;">Documents Verified</div>' : '<div style="font-size:11px;color:#ef4444;font-weight:700;text-transform:uppercase;margin-top:6px;">Pending Verification</div>'}
                    </td>
                    <td><span class="status-badge ${escapeHtml(st)}">${escapeHtml(st)}</span></td>
                    <td><div style="font-weight:600;">★ ${Number(rider.Rider_Rating||0).toFixed(1)}</div>
                        <div style="font-size:12px;color:#64748b;">${Number(rider.Rider_TotalDeliveries||0)} Deliveries</div></td>
                    <td><div class="actions">${actions}</div></td>
                </tr>`;
            }).join('');

            tbody.querySelectorAll('[data-edit]').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const r = riders.find((x) => x._id === btn.dataset.edit);
                    if (!r) return;
                    document.getElementById('formRiderId').value = r._id;
                    document.getElementById('fname').value = r.Rider_Fname || '';
                    document.getElementById('lname').value = r.Rider_Lname || '';
                    document.getElementById('email').value = r.Rider_Email || '';
                    document.getElementById('phone').value = r.Rider_Phone || '';
                    document.getElementById('vehicle_type').value = r.Rider_VehicleType || 'Motorcycle';
                    document.getElementById('plate_number').value = r.Rider_PlateNumber || '';
                    document.getElementById('license_number').value = r.Rider_LicenseNumber || '';
                    modal.style.display = 'block';
                });
            });
            tbody.querySelectorAll('[data-action]').forEach((btn) => {
                btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.id));
            });
        }

        async function handleAction(action, riderId) {
            if (action === 'delete' && !confirm('Are you sure you want to delete this rider?')) return;
            if (action === 'reject' && !confirm('Reject this application?')) return;
            try {
                if (action === 'delete') {
                    await deleteRecord('riders', riderId);
                    showAlert('alert-box', 'Rider deleted successfully!', 'success');
                } else if (action === 'approve') {
                    await updateRecord('riders', riderId, { Rider_Status: 'active', Rider_Verified: true });
                    showAlert('alert-box', 'Rider approved successfully!', 'success');
                } else if (action === 'reject') {
                    await updateRecord('riders', riderId, { Rider_Status: 'rejected' });
                    showAlert('alert-box', 'Rider rejected.', 'success');
                } else if (action === 'verify') {
                    await updateRecord('riders', riderId, { Rider_Verified: true });
                    showAlert('alert-box', 'Documents verified.', 'success');
                } else if (action === 'suspend') {
                    await updateRecord('riders', riderId, { Rider_Status: 'suspended' });
                    showAlert('alert-box', 'Rider suspended.', 'success');
                } else if (action === 'activate') {
                    await updateRecord('riders', riderId, { Rider_Status: 'active' });
                    showAlert('alert-box', 'Rider activated.', 'success');
                }
                await refresh();
            } catch (e) {
                showAlert('alert-box', 'Action failed.', 'error');
            }
        }

        async function refresh() {
            riders = await getAll('riders');
            riders.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
            renderTable(filterRows(riders, document.getElementById('search-input').value.trim()));
        }

        document.getElementById('riderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('formRiderId').value;
            try {
                await updateRecord('riders', id, {
                    Rider_Fname: document.getElementById('fname').value.trim(),
                    Rider_Lname: document.getElementById('lname').value.trim(),
                    Rider_Email: document.getElementById('email').value.trim(),
                    Rider_Phone: document.getElementById('phone').value.trim(),
                    Rider_VehicleType: document.getElementById('vehicle_type').value,
                    Rider_PlateNumber: document.getElementById('plate_number').value.trim(),
                    Rider_LicenseNumber: document.getElementById('license_number').value.trim(),
                });
                showAlert('alert-box', 'Rider details updated successfully!', 'success');
                modal.style.display = 'none';
                await refresh();
            } catch (err) {
                showAlert('alert-box', 'Error updating rider.', 'error');
            }
        });

        document.getElementById('close-modal').addEventListener('click', () => { modal.style.display = 'none'; });
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
        document.getElementById('search-form').addEventListener('submit', (e) => { e.preventDefault(); refresh(); });
        document.getElementById('search-input').addEventListener('input', refresh);

        await refresh();
    </script>
</body>
</html>
