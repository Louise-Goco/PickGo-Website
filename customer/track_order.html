<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - PickGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        .page-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header-actions { margin-top: 40px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .back-link { color: #64748b; text-decoration: none; font-weight: 600; }
        .order-id-badge { background: #f8fafc; padding: 8px 16px; border-radius: 20px; font-weight: 700; border: 1px solid #e2e8f0; }
        .tracking-layout { display: grid; grid-template-columns: 3fr 2fr; gap: 32px; min-height: 600px; }
        .map-area { background: #e2e8f0; border-radius: 24px; position: relative; overflow: hidden; min-height: 400px; }
        .map-image { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; min-height: 400px; }
        .live-badge { position: absolute; top: 24px; left: 24px; background: #fff; padding: 8px 16px; border-radius: 20px; font-weight: 700; color: #ef4444; display: flex; align-items: center; gap: 8px; }
        .pulse { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }
        .status-area { background: #fff; border-radius: 24px; padding: 32px; border: 1px solid rgba(0,0,0,0.05); }
        .eta-section { text-align: center; margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid #f1f5f9; }
        .eta-time { font-size: 48px; font-weight: 800; color: #0f172a; margin: 0; }
        .eta-desc { font-size: 16px; color: #f97316; font-weight: 600; margin-top: 8px; }
        .timeline-item { position: relative; padding-bottom: 32px; padding-left: 32px; }
        .timeline-item::before { content: ''; position: absolute; left: 6px; top: 24px; bottom: -8px; width: 2px; background: #e2e8f0; }
        .timeline-item:last-child::before { display: none; }
        .timeline-dot { position: absolute; left: 0; top: 4px; width: 14px; height: 14px; border-radius: 50%; background: #e2e8f0; border: 3px solid #fff; z-index: 2; }
        .timeline-item.completed .timeline-dot { background: #f97316; }
        .timeline-item.completed::before { background: #f97316; }
        .timeline-item.active .timeline-dot { border-color: #f97316; background: #fff; }
        .rider-card { margin-top: 32px; padding: 20px; background: #f8fafc; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #e2e8f0; flex-wrap: wrap; gap: 16px; }
        .rider-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; }
        @media (max-width: 900px) { .tracking-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="customer-nav-root"></div>
    <div class="page-container" id="track-root"></div>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script type="module">
        import { requireCustomer } from '../js/guard.js';
        import { renderCustomerNav } from '../js/nav-customer.js';
        import { getById, queryWhere } from '../js/db.js';
        import { escapeHtml, imgUrl, getQueryParam, formatDate } from '../js/utils.js';

        const ctx = await requireCustomer();
        if (!ctx) throw new Error('Unauthorized');
        await renderCustomerNav();
        const { user } = ctx;

        const orderId = getQueryParam('id');
        if (!orderId) { location.href = 'my_orders.html'; throw new Error('missing id'); }

        let order = await getById('orders', orderId);
        if (!order) {
            const rows = await queryWhere('orders', 'Order_Id', '==', orderId);
            order = rows[0];
        }
        if (!order || String(order.Customer_Id) !== String(user._id)) {
            location.href = 'my_orders.html';
            throw new Error('not found');
        }

        const seller = await getById('sellers', String(order.Seller_Id));
        const merchant = seller ? await getById('merchants', String(seller.Merch_Id)) : null;
        let rider = null;
        if (order.Rider_Id) {
            rider = await getById('riders', String(order.Rider_Id));
            if (!rider) {
                const riders = await queryWhere('riders', 'Rider_Id', '==', order.Rider_Id);
                rider = riders[0];
            }
        }

        const status = order.Order_Status;
        let etaTime = '25 Min';
        let etaDesc = 'Store is preparing your order';
        let stepPrep = '';
        let stepReady = '';
        let stepDel = '';
        let stepComp = '';

        if (status === 'ready_for_pickup') {
            etaTime = '20 Min'; etaDesc = 'Store ready, waiting for rider pickup';
            stepPrep = 'completed'; stepReady = 'active';
        } else if (status === 'on_the_way') {
            etaTime = '15 Min'; etaDesc = 'Rider is on the way';
            stepPrep = 'completed'; stepReady = 'completed'; stepDel = 'active';
        } else if (status === 'delivered') {
            etaTime = 'Delivered'; etaDesc = 'Enjoy your food!';
            stepPrep = stepReady = stepDel = stepComp = 'completed';
        } else if (status === 'cancelled') {
            etaTime = 'Cancelled'; etaDesc = 'Order was cancelled';
        } else if (status === 'pending' || status === 'preparing') {
            stepPrep = 'active';
        }

        const oid = order.Order_Id || order._id;
        const DEFAULT_RIDER = 'https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&q=80&w=100&h=100';

        document.getElementById('track-root').innerHTML = `
            <div class="header-actions">
                <a href="my_orders.html" class="back-link">← Back to Orders</a>
                <div class="order-id-badge">Order #${escapeHtml(oid)}</div>
            </div>
            <div class="tracking-layout">
                <div class="map-area">
                    <div class="live-badge"><div class="pulse"></div> Live Tracking</div>
                    <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&q=80&w=1200&h=800" alt="Map" class="map-image">
                </div>
                <div class="status-area">
                    <div class="eta-section">
                        <div style="font-size:15px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;">Estimated Delivery Time</div>
                        <div class="eta-time">${escapeHtml(etaTime)}</div>
                        <div class="eta-desc">${escapeHtml(etaDesc)}</div>
                    </div>
                    <div class="timeline">
                        <div class="timeline-item completed"><div class="timeline-dot"></div><h4>Order Confirmed</h4><div style="font-size:13px;color:#64748b;">${formatDate(order.Order_Date)}</div></div>
                        <div class="timeline-item ${stepPrep}"><div class="timeline-dot"></div><h4>Preparing Order</h4></div>
                        <div class="timeline-item ${stepReady}"><div class="timeline-dot"></div><h4>Ready for Pickup</h4></div>
                        <div class="timeline-item ${stepDel}"><div class="timeline-dot"></div><h4>Out for Delivery</h4></div>
                        <div class="timeline-item ${stepComp}"><div class="timeline-dot"></div><h4>Order Delivered</h4></div>
                    </div>
                    ${rider ? `
                    <div class="rider-card">
                        <div style="display:flex;align-items:center;gap:16px;">
                            <img src="${imgUrl(rider.Rider_Photo, DEFAULT_RIDER)}" class="rider-avatar" alt="">
                            <div>
                                <h3 style="margin:0 0 4px;">${escapeHtml((rider.Rider_Fname || '') + ' ' + (rider.Rider_Lname || ''))}</h3>
                                <div style="font-size:13px;color:#64748b;">${escapeHtml((rider.Rider_VehicleType || '') + ' • ' + (rider.Rider_PlateNumber || ''))}</div>
                            </div>
                        </div>
                        ${rider.Rider_Phone ? `<a href="tel:${escapeHtml(rider.Rider_Phone)}" style="padding:12px 20px;background:#f97316;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;">Call Rider</a>` : ''}
                    </div>` : `<div class="rider-card" style="justify-content:center;color:#64748b;">Waiting for a rider to be assigned...</div>`}
                </div>
            </div>`;
        document.title = `Track Order #${oid} - PickGo`;
    </script>
</body>
</html>
