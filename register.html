<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <meta name="description" content="Create a new account.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
        }
        .login-container.register { max-width: 500px; }
        .input-row { display: flex; gap: 16px; }
        .input-row .input-group { flex: 1; }
        @media (max-width: 480px) {
            .input-row { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="background: #10b981;"></div>
    </div>

    <div class="login-container register">
        <div class="glass-panel">
            <a href="index.html" class="back-home-btn" title="Back to Homepage">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <div class="login-header">
                <h2>Create Account</h2>
                <p>Join us and start your journey</p>
            </div>

            <div id="errorBox" class="error-message" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span id="errorText"></span>
            </div>

            <div id="successBox" class="success-message" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span id="successText"></span>
            </div>

            <form id="registerForm" class="login-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="first_name">First Name</label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <input type="text" id="first_name" name="first_name" placeholder="First Name" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="last_name">Last Name</label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <input type="text" id="last_name" name="last_name" placeholder="Last Name" required>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <input type="email" id="email" name="email" placeholder="john@example.com" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="phone_number">Phone Number</label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            <input type="tel" id="phone_number" name="phone_number" placeholder="+1234567890" required>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="password" name="password" placeholder="Create password" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
                        </div>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 10px;">
                    <label class="remember-me">
                        <input type="checkbox" name="terms" id="terms" required>
                        <span class="checkmark"></span>
                        I agree to the Terms &amp; Conditions
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>Sign Up</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5c-1.1 0-2 .9-2 2v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                </button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { registerCustomer } from './js/auth.js';
        import { redirectIfLoggedIn } from './js/guard.js';

        redirectIfLoggedIn();

        const form = document.getElementById('registerForm');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const successBox = document.getElementById('successBox');
        const successText = document.getElementById('successText');
        const submitBtn = document.getElementById('submitBtn');

        function showError(msg) {
            errorText.textContent = msg;
            errorBox.style.display = msg ? 'flex' : 'none';
            if (msg) successBox.style.display = 'none';
        }

        function showSuccess(msg) {
            successText.textContent = msg;
            successBox.style.display = msg ? 'flex' : 'none';
            if (msg) errorBox.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            showError('');
            showSuccess('');
            submitBtn.disabled = true;

            const data = {
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                email: document.getElementById('email').value,
                phone_number: document.getElementById('phone_number').value,
                password: document.getElementById('password').value,
            };
            const confirm = document.getElementById('confirm_password').value;
            const terms = document.getElementById('terms').checked;

            if (!data.first_name.trim() || !data.last_name.trim() || !data.email.trim() || !data.phone_number.trim() || !data.password) {
                showError('All fields are required.');
                submitBtn.disabled = false;
                return;
            }
            if (data.password !== confirm) {
                showError('Passwords do not match.');
                submitBtn.disabled = false;
                return;
            }
            if (!terms) {
                showError('You must agree to the terms and conditions.');
                submitBtn.disabled = false;
                return;
            }

            try {
                const result = await registerCustomer(data);
                if (result.ok) {
                    showSuccess('Registration successful! You can now log in.');
                    form.reset();
                } else {
                    showError(result.error || 'Registration failed.');
                }
            } catch (err) {
                showError('Database error: ' + (err.message || 'Please try again.'));
            }
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
