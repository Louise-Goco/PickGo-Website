<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews - PickGo Rider</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        :root {
            --primary: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --star: #f59e0b;
        }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-main); margin: 0; }
        .page-container { max-width: 900px; }
        .header-title { font-size: 32px; font-weight: 800; margin: 0 0 8px; }
        .header-subtitle { color: var(--text-muted); font-size: 16px; margin: 0; }
        .overview-card { background: var(--card); border-radius: 24px; padding: 36px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin: 32px 0 40px; display: grid; grid-template-columns: auto 1fr; gap: 48px; align-items: center; }
        .big-rating { font-size: 64px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
        .big-stars { font-size: 24px; color: var(--star); letter-spacing: 2px; margin-bottom: 8px; }
        .review-count { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .bars-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .bar-row { display: flex; align-items: center; gap: 16px; }
        .bar-label { width: 50px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .bar-track { flex: 1; height: 10px; background: #f1f5f9; border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--star); border-radius: 99px; }
        .bar-count { width: 40px; font-size: 14px; font-weight: 600; color: var(--text-muted); text-align: right; }
        .reviews-feed { display: flex; flex-direction: column; gap: 20px; }
        .review-item { background: var(--card); border-radius: 20px; padding: 28px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .review-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .reviewer-info { display: flex; align-items: center; gap: 12px; }
        .reviewer-avatar { width: 42px; height: 42px; border-radius: 50%; background: #e0f2fe; color: #0369a1; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
        .reviewer-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
        .review-date { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .star-display { color: var(--star); font-size: 16px; letter-spacing: 1px; }
        .review-body { font-size: 15px; color: #334155; line-height: 1.6; margin: 0; }
        .order-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #f0fdf4; color: #166534; font-size: 12px; font-weight: 700; border-radius: 8px; margin-top: 16px; }
        .empty-reviews { background: var(--card); padding: 64px 20px; text-align: center; border-radius: 24px; border: 2px dashed #cbd5e1; color: var(--text-muted); }
        @media (max-width: 640px) { .overview-card { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>
    <div id="rider-nav-root"></div>
    <main class="main-content">
        <div class="page-container">
            <h1 class="header-title">My Ratings & Reviews</h1>
            <p class="header-subtitle">See what customers are saying about your delivery service.</p>
            <div class="overview-card">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <div class="big-rating" id="avg-rating">0.0</div>
                    <div class="big-stars" id="big-stars"></div>
                    <div class="review-count" id="review-count">0 total reviews</div>
                </div>
                <div class="bars-container" id="bars-container"></div>
            </div>
            <h2 style="font-size:20px;font-weight:800;margin-bottom:24px;">Recent Feedback</h2>
            <div id="reviews-list"></div>
        </div>
    </main>

    <script type="module">
        import { requireRider } from '../js/guard.js';
        import { renderRiderNav } from '../js/nav-rider.js';
        import { queryOne } from '../js/db.js';
        import { getRiderReviews } from '../js/rider-orders.js';
        import { escapeHtml } from '../js/utils.js';

        function stars(n) {
            let s = '';
            for (let i = 1; i <= 5; i++) s += i <= Math.round(n) ? '★' : '☆';
            return s;
        }

        function fmtDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleString('en-PH', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
        }

        async function init() {
            const auth = await requireRider();
            if (!auth) return;
            renderRiderNav('reviews');

            const rider = await queryOne('riders', 'Rider_Email', auth.session.user);
            if (!rider) {
                window.location.href = '../login.html';
                return;
            }
            const riderId = auth.session.rider_id || rider._id;
            const { reviews, breakdown, avg_rating, total } = await getRiderReviews(riderId);

            document.getElementById('avg-rating').textContent = avg_rating.toFixed(1);
            document.getElementById('big-stars').textContent = stars(avg_rating);
            document.getElementById('review-count').textContent = `${total} total reviews`;

            let bars = '';
            for (let star = 5; star >= 1; star--) {
                const count = breakdown[star] || 0;
                const pct = total > 0 ? (count / total) * 100 : 0;
                bars += `<div class="bar-row">
                    <div class="bar-label">${star} <span style="color:var(--star);">★</span></div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
                    <div class="bar-count">${count}</div>
                </div>`;
            }
            document.getElementById('bars-container').innerHTML = bars;

            const list = document.getElementById('reviews-list');
            if (!reviews.length) {
                list.innerHTML = `<div class="empty-reviews">
                    <div style="font-size:48px;margin-bottom:16px;">⭐</div>
                    <h3 style="font-size:18px;font-weight:700;color:var(--text-main);margin-bottom:8px;">No reviews yet</h3>
                    <p style="margin:0;">Complete more delivery trips to start earning customer feedback and ratings!</p>
                </div>`;
                return;
            }

            list.innerHTML = `<div class="reviews-feed">${reviews.map((r) => {
                const initials = ((r.first_name || 'C').charAt(0) + (r.last_name || '').charAt(0)).toUpperCase();
                const name = `${r.first_name || 'Customer'} ${r.last_name || ''}`.trim();
                const rating = Number(r.Rating) || 0;
                let starStr = '';
                for (let i = 1; i <= 5; i++) starStr += i <= rating ? '★' : '☆';
                const comment = r.Comment
                    ? `<p class="review-body">"${escapeHtml(r.Comment)}"</p>`
                    : `<p class="review-body" style="font-style:italic;color:#94a3b8;">No comment provided.</p>`;
                return `<div class="review-item">
                    <div class="review-item-header">
                        <div class="reviewer-info">
                            <div class="reviewer-avatar">${escapeHtml(initials)}</div>
                            <div>
                                <div class="reviewer-name">${escapeHtml(name)}</div>
                                <div class="review-date">${fmtDate(r.created_at)}</div>
                            </div>
                        </div>
                        <div class="star-display">${starStr}</div>
                    </div>
                    ${comment}
                    <div class="order-badge">Order #${escapeHtml(String(r.Order_Id || ''))}</div>
                </div>`;
            }).join('')}</div>`;
        }

        init();
    </script>
</body>
</html>
