<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - PickGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        .analytics-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-top: 32px; }
        .card { background: #fff; border-radius: 20px; border: 1px solid rgba(0,0,0,0.05); padding: 32px; }
        .stat-banner { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
        .banner-item { background: #fff; padding: 24px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); }
        .banner-item label { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .banner-item .value { font-size: 28px; font-weight: 800; margin-top: 8px; }
        .best-seller-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #f1f5f9; }
        .trend-bar-container { display: flex; align-items: flex-end; gap: 12px; height: 200px; padding-top: 20px; }
        .trend-bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .trend-bar { width: 100%; background: #f97316; border-radius: 6px 6px 0 0; min-height: 2px; }
        .trend-label { font-size: 10px; color: #94a3b8; font-weight: 600; }
        @media (max-width: 900px) { .analytics-grid, .stat-banner { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <div id="seller-nav-root"></div>
        <main class="main-content">
            <div style="margin-bottom: 32px;">
                <h1 style="font-size: 28px; font-weight: 700;">Sales Analytics</h1>
                <p style="color: #64748b;">Overview of your store's performance and trends.</p>
            </div>
            <div class="stat-banner" id="stat-banner"></div>
            <div class="analytics-grid">
                <div class="card"><h3 style="margin-bottom:24px;">Revenue Trend (Last 7 Days)</h3><div class="trend-bar-container" id="trend-chart"></div></div>
                <div class="card"><h3 style="margin-bottom:24px;">Best Sellers</h3><div id="best-sellers"></div></div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script type="module">
        import { requireSeller } from '../js/guard.js';
        import { getSellerByStoreEmail, queryWhere, getAll } from '../js/db.js';
        import { renderSellerNav } from '../js/nav-seller.js';
        import { escapeHtml, formatMoney } from '../js/utils.js';

        function orderId(o) { return String(o.Order_Id || o._id); }

        async function init() {
            const auth = await requireSeller();
            if (!auth) return;
            const ctx = await getSellerByStoreEmail(auth.session.user);
            if (!ctx || ctx.seller.Sellr_Status !== 'active') {
                window.location.href = '../login.html';
                return;
            }
            renderSellerNav('analytics');
            const seller_id = auth.session.seller_id || ctx.seller._id;

            const [orders, orderItems] = await Promise.all([
                queryWhere('orders', 'Seller_Id', '==', seller_id),
                getAll('order_items'),
            ]);

            const delivered = orders.filter((o) => o.Order_Status === 'delivered');
            const total_revenue = delivered.reduce((s, o) => s + Number(o.Order_Total || 0), 0);
            const completed = delivered.length;
            const cancelled = orders.filter((o) => o.Order_Status === 'cancelled').length;
            const total_orders = orders.length;
            const successRate = total_orders ? Math.round((completed / total_orders) * 100) : 0;

            document.getElementById('stat-banner').innerHTML = `
                <div class="banner-item"><label>Total Revenue</label><div class="value">${formatMoney(total_revenue)}</div></div>
                <div class="banner-item"><label>Success Rate</label><div class="value">${successRate}%</div></div>
                <div class="banner-item"><label>Total Orders</label><div class="value">${total_orders.toLocaleString()}</div></div>`;

            const trend_data = {};
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                trend_data[d.toISOString().slice(0, 10)] = 0;
            }
            for (const o of delivered) {
                const key = (o.Order_Date || '').slice(0, 10);
                if (key in trend_data) trend_data[key] += Number(o.Order_Total || 0);
            }
            const max_rev = Math.max(...Object.values(trend_data), 1);
            document.getElementById('trend-chart').innerHTML = Object.entries(trend_data)
                .map(([date, revenue]) => {
                    const h = (revenue / max_rev) * 100;
                    const day = new Date(date).toLocaleDateString('en-US', { weekday: 'short' });
                    return `<div class="trend-bar-wrapper">
                        <div style="font-size:10px;color:#64748b;">₱${Math.round(revenue).toLocaleString()}</div>
                        <div class="trend-bar" style="height:${h}%;"></div>
                        <div class="trend-label">${escapeHtml(day)}</div>
                    </div>`;
                })
                .join('');

            const deliveredIds = new Set(delivered.map(orderId));
            const agg = {};
            for (const oi of orderItems) {
                if (!deliveredIds.has(String(oi.Order_Id))) continue;
                const name = oi.Food_Name || 'Item';
                if (!agg[name]) agg[name] = { qty: 0, sales: 0 };
                agg[name].qty += Number(oi.Quantity || 0);
                agg[name].sales += Number(oi.Quantity || 0) * Number(oi.Price || 0);
            }
            const best = Object.entries(agg)
                .map(([Food_Name, v]) => ({ Food_Name, total_qty: v.qty, total_sales: v.sales }))
                .sort((a, b) => b.total_qty - a.total_qty)
                .slice(0, 5);

            const bsEl = document.getElementById('best-sellers');
            if (!best.length) {
                bsEl.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px 0;">Not enough data yet.</p>';
            } else {
                bsEl.innerHTML = best
                    .map(
                        (item) => `<div class="best-seller-row">
                            <div style="font-weight:600;">${escapeHtml(item.Food_Name)}</div>
                            <div style="text-align:right;">
                                <div style="font-size:14px;color:#64748b;">${item.total_qty} sold</div>
                                <div style="font-weight:700;color:#f97316;">${formatMoney(item.total_sales)}</div>
                            </div>
                        </div>`
                    )
                    .join('');
            }
        }
        init();
    </script>
</body>
</html>
