<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - PickGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        body { background: #f8fafc; }
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .welcome-card { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 40px; border-radius: 32px; color: #fff; margin-bottom: 40px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        .welcome-card::after { content: ''; position: absolute; top: -50%; right: -10%; width: 300px; height: 300px; background: rgba(249, 115, 22, 0.1); filter: blur(80px); border-radius: 50%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-top: 32px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 24px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        .stat-card h3 { font-size: 12px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .stat-card .value { font-size: 32px; font-weight: 800; color: #fff; }
        .table-container { background: #fff; padding: 32px; border-radius: 32px; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .table-title { font-size: 20px; font-weight: 800; color: #0f172a; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 12px 20px; color: #94a3b8; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        td { padding: 20px; background: #fcfcfc; }
        tr:hover td { background: #f8fafc; }
        td:first-child { border-radius: 16px 0 0 16px; }
        td:last-child { border-radius: 0 16px 16px 0; }
        .status-badge { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-delivered { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .status-preparing { background: #e0f2fe; color: #0369a1; }
        .status-ready_for_pickup { background: #fef3c7; color: #d97706; }
        .status-cancelled { background: #fef2f2; color: #991b1b; }
        .status-on_the_way { background: #f0fdf4; color: #166534; }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <div id="seller-nav-root"></div>
        <main class="main-content">
            <div class="header-section">
                <div>
                    <h1 style="font-size: 28px; font-weight: 700; color: #0f172a;">Store Overview</h1>
                    <p style="color: #64748b;">Managing <strong id="store-name">…</strong></p>
                </div>
                <a href="../customer/dashboard.html" style="padding: 10px 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; text-decoration: none; color: #0f172a; font-weight: 600; font-size: 14px;">Switch to Customer</a>
            </div>
            <div class="welcome-card">
                <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">Welcome back, <span id="seller-fname">…</span>!</h2>
                <p style="color: #e2e8f0; margin-bottom: 24px;">Your store is currently <strong>active</strong> and visible to customers.</p>
                <div class="stats-grid" id="stats-grid"></div>
            </div>
            <div class="table-container">
                <div class="table-header">
                    <h3 class="table-title">Recent Orders</h3>
                    <a href="manage_orders.html" style="color: #f97316; font-weight: 700; text-decoration: none; font-size: 14px;">View All →</a>
                </div>
                <table>
                    <thead>
                        <tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr>
                    </thead>
                    <tbody id="recent-orders-body"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script type="module">
        import { requireSeller } from '../js/guard.js';
        import { getSellerByStoreEmail, getOrdersForSeller, getUserByRef, queryWhere } from '../js/db.js';
        import { renderSellerNav } from '../js/nav-seller.js';
        import { escapeHtml, formatMoney, displayOrderId } from '../js/utils.js';

        async function loadCustomer(order) {
            const u = await getUserByRef(order.Customer_Id);
            return { first_name: u?.first_name || 'Unknown', last_name: u?.last_name || '' };
        }
        function isToday(d) {
            const x = new Date(d);
            const t = new Date();
            return x.getFullYear() === t.getFullYear() && x.getMonth() === t.getMonth() && x.getDate() === t.getDate();
        }

        async function init() {
            const auth = await requireSeller();
            if (!auth) return;
            const ctx = await getSellerByStoreEmail(auth.session.user);
            if (!ctx || ctx.seller.Sellr_Status !== 'active') {
                window.location.href = '../login.html';
                return;
            }
            renderSellerNav('dashboard');
            const { seller, merchant } = ctx;
            const seller_id = auth.session.seller_id || seller._id;
            const sellerData = { ...seller, ...merchant };

            document.title = `Seller Dashboard - ${merchant.Merch_Name || 'PickGo'}`;
            document.getElementById('store-name').textContent = merchant.Merch_Name || '';
            document.getElementById('seller-fname').textContent = seller.Sellr_Fname || '';

            const [orders, items, payouts] = await Promise.all([
                getOrdersForSeller(seller),
                queryWhere('items', 'Seller_Id', '==', seller_id),
                queryWhere('payouts', 'User_Type', '==', 'seller').then((rows) =>
                    rows.filter((p) => String(p.User_Id) === String(seller_id) && p.Payout_Status === 'pending')
                ),
            ]);

            const todays_orders = orders.filter((o) => isToday(o.Order_Date)).length;
            const total_revenue = orders
                .filter((o) => o.Order_Status === 'delivered')
                .reduce((s, o) => s + Number(o.Order_Total || 0), 0);
            const active_listings = items.filter((i) => i.Item_Status === 'available').length;
            const pending_payouts = payouts.reduce((s, p) => s + Number(p.Amount || 0), 0);

            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card"><h3>Today's Orders</h3><div class="value">${todays_orders}</div></div>
                <div class="stat-card"><h3>Total Revenue</h3><div class="value">${formatMoney(total_revenue)}</div></div>
                <div class="stat-card"><h3>Active Listings</h3><div class="value">${active_listings}</div></div>
                <div class="stat-card"><h3>Pending Payouts</h3><div class="value">${formatMoney(pending_payouts)}</div></div>
                <div class="stat-card"><h3>Store Rating</h3><div class="value">${Number(seller.Sellr_Rating || 0).toFixed(1)} ★</div></div>`;

            const recent = [...orders]
                .sort((a, b) => new Date(b.Order_Date || 0) - new Date(a.Order_Date || 0))
                .slice(0, 5);

            const tbody = document.getElementById('recent-orders-body');
            if (!recent.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="padding:60px 0;text-align:center;color:#94a3b8;font-weight:600;">No orders found yet.</td></tr>';
                return;
            }

            const rows = await Promise.all(
                recent.map(async (order) => {
                    const c = await loadCustomer(order);
                    const st = (order.Order_Status || 'pending').toLowerCase();
                    const dt = order.Order_Date ? new Date(order.Order_Date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
                    return `<tr>
                        <td style="font-weight:700;">#${escapeHtml(displayOrderId(order))}</td>
                        <td style="font-weight:600;">${escapeHtml(c.first_name + ' ' + c.last_name)}</td>
                        <td style="font-weight:800;">${formatMoney(order.Order_Total)}</td>
                        <td><span class="status-badge status-${st}">${escapeHtml((order.Order_Status || '').replace(/_/g, ' '))}</span></td>
                        <td style="color:#94a3b8;font-size:13px;">${escapeHtml(dt)}</td>
                    </tr>`;
                })
            );
            tbody.innerHTML = rows.join('');
        }
        init();
    </script>
</body>
</html>
