<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - PickGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        .order-card { background: #fff; border-radius: 20px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 24px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .order-header { padding: 20px 24px; background: #f8fafc; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .order-body { padding: 24px; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .item-list { list-style: none; padding: 0; margin: 0; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; font-size: 14px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-pending { background: #fef9c3; color: #854d0e; }
        .badge-preparing { background: #e0f2fe; color: #0369a1; }
        .badge-ready_for_pickup { background: #fef3c7; color: #d97706; }
        .badge-on_the_way { background: #f0fdf4; color: #166534; }
        .badge-delivered { background: #f1f5f9; color: #475569; }
        .badge-cancelled { background: #fef2f2; color: #991b1b; }
        .action-btns { display: flex; gap: 12px; margin-top: 20px; }
        .btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
        .btn-primary { background: #f97316; color: #fff; }
        .btn-danger { background: #fff; border: 1px solid #fee2e2; color: #ef4444; }
        @media (max-width: 768px) { .order-body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <div id="seller-nav-root"></div>
        <main class="main-content">
            <div style="margin-bottom: 32px;">
                <h1 style="font-size: 28px; font-weight: 700;">Store Orders</h1>
                <p style="color: #64748b;">Manage incoming orders and update preparation status.</p>
            </div>
            <div id="alert-box"></div>
            <div id="orders-container"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script type="module">
        import { requireSeller } from '../js/guard.js';
        import { getSellerByStoreEmail, getOrdersForSeller, getUserByRef, getAll, orderItemsForOrder, updateRecord } from '../js/db.js';
        import { renderSellerNav } from '../js/nav-seller.js';
        import { escapeHtml, formatMoney, showAlert, displayOrderId } from '../js/utils.js';

        async function updateStatus(seller, oid, action) {
            const map = { confirm: 'preparing', reject: 'cancelled', dispatch: 'ready_for_pickup' };
            const newStatus = map[action];
            if (!newStatus) return;
            await updateRecord('orders', oid, { Order_Status: newStatus });
            showAlert('alert-box', `Order #${displayOrderId({ _id: oid })} status updated to ${newStatus}!`, 'success');
            await renderOrders(seller);
        }

        async function renderOrders(seller) {
            const [orders, allItems] = await Promise.all([
                getOrdersForSeller(seller),
                getAll('order_items'),
            ]);
            orders.sort((a, b) => new Date(b.Order_Date || 0) - new Date(a.Order_Date || 0));

            const container = document.getElementById('orders-container');
            if (!orders.length) {
                container.innerHTML = '<div style="text-align:center;padding:80px;background:#fff;border-radius:20px;"><p style="color:#64748b;">No orders found for your store.</p></div>';
                return;
            }

            const usersCache = {};
            async function customerFor(cid) {
                if (!cid) return { first_name: 'Unknown', last_name: '', phone_number: '' };
                const key = String(cid);
                if (usersCache[key]) return usersCache[key];
                const u = await getUserByRef(cid);
                usersCache[key] = u || { first_name: 'Unknown', last_name: '', phone_number: '' };
                return usersCache[key];
            }

            const html = await Promise.all(
                orders.map(async (order) => {
                    const oid = order._id;
                    const label = displayOrderId(order);
                    const c = await customerFor(order.Customer_Id);
                    const items = orderItemsForOrder(allItems, order);
                    const st = order.Order_Status || 'pending';
                    const dt = order.Order_Date ? new Date(order.Order_Date).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

                    let actions = '';
                    if (st === 'pending') {
                        actions = `<div class="action-btns">
                            <button type="button" class="btn btn-primary" data-action="confirm" data-id="${escapeHtml(oid)}" style="flex:2;">Confirm (Start Preparing)</button>
                            <button type="button" class="btn btn-danger" data-action="reject" data-id="${escapeHtml(oid)}" style="flex:1;">Reject</button>
                        </div>`;
                    } else if (st === 'preparing') {
                        actions = `<button type="button" class="btn btn-primary" data-action="dispatch" data-id="${escapeHtml(oid)}" style="width:100%;">Ready for Dispatch (Notify Rider)</button>`;
                    } else if (st === 'ready_for_pickup') {
                        actions = '<span style="color:#64748b;font-size:13px;font-weight:600;">Waiting for rider pickup…</span>';
                    } else if (st === 'on_the_way') {
                        actions = '<span style="color:#10b981;font-size:13px;font-weight:600;">Rider is out for delivery</span>';
                    }

                    const itemRows = items
                        .map(
                            (item) =>
                                `<li class="item-row"><span>${item.Quantity}x ${escapeHtml(item.Food_Name)}</span><span style="font-weight:600;">${formatMoney(Number(item.Price) * Number(item.Quantity))}</span></li>`
                        )
                        .join('');

                    return `<div class="order-card">
                        <div class="order-header">
                            <div><span style="font-weight:700;">Order #${escapeHtml(label)}</span><span style="margin-left:12px;color:#64748b;font-size:13px;">${escapeHtml(dt)}</span></div>
                            <span class="badge badge-${st}">${escapeHtml(st.replace(/_/g, ' '))}</span>
                        </div>
                        <div class="order-body">
                            <div>
                                <h4 style="font-size:14px;color:#64748b;margin-bottom:12px;text-transform:uppercase;">Items</h4>
                                <ul class="item-list">${itemRows}</ul>
                                <div style="margin-top:16px;text-align:right;font-weight:800;font-size:18px;color:#f97316;">Total: ${formatMoney(order.Order_Total)}</div>
                            </div>
                            <div style="border-left:1px solid #f1f5f9;padding-left:40px;">
                                <h4 style="font-size:14px;color:#64748b;margin-bottom:12px;text-transform:uppercase;">Customer</h4>
                                <div style="font-weight:700;margin-bottom:4px;">${escapeHtml(c.first_name + ' ' + c.last_name)}</div>
                                <div style="font-size:13px;color:#64748b;margin-bottom:16px;">${escapeHtml(c.phone_number || '')}</div>
                                <h4 style="font-size:14px;color:#64748b;margin-bottom:8px;text-transform:uppercase;">Delivery Address</h4>
                                <div style="font-size:13px;color:#475569;line-height:1.4;">${escapeHtml(order.Delivery_Address || '').replace(/\n/g, '<br>')}</div>
                                <div class="action-btns">${actions}</div>
                            </div>
                        </div>
                    </div>`;
                })
            );
            container.innerHTML = html.join('');

            container.querySelectorAll('[data-action]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    await updateStatus(sellerRecord, btn.dataset.id, btn.dataset.action);
                });
            });
        }

        let sellerRecord = null;

        async function init() {
            const auth = await requireSeller();
            if (!auth) return;
            const ctx = await getSellerByStoreEmail(auth.session.user);
            if (!ctx || ctx.seller.Sellr_Status !== 'active') {
                window.location.href = '../login.html';
                return;
            }
            renderSellerNav('orders');
            document.title = `Manage Orders - ${ctx.merchant.Merch_Name || 'PickGo'}`;
            sellerRecord = ctx.seller;
            await renderOrders(sellerRecord);
        }
        init();
    </script>
</body>
</html>
