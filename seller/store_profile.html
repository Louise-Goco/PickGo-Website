<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Profile - PickGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login.css">
    <style>
        .settings-card { background: #fff; padding: 32px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.05); max-width: 800px; }
        .preview-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; margin-bottom: 32px; }
        .logo-preview, .banner-preview { border-radius: 20px; background: #f1f5f9; border: 2px dashed #e2e8f0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .logo-preview { width: 120px; height: 120px; }
        .banner-preview { height: 120px; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-save { background: #f97316; color: #fff; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <div id="seller-nav-root"></div>
        <main class="main-content">
            <div style="margin-bottom: 32px;">
                <h1 style="font-size: 28px; font-weight: 700;">Store Profile</h1>
                <p style="color: #64748b;">Customize how your store appears to customers.</p>
            </div>
            <div id="alert-box"></div>
            <form id="profile-form" class="settings-card">
                <div class="preview-grid">
                    <div>
                        <label style="display:block;font-size:14px;font-weight:600;color:#64748b;margin-bottom:12px;">Store Logo</label>
                        <div class="logo-preview" id="logo-preview"></div>
                        <input type="file" name="logo" id="logo-input" accept="image/*" style="margin-top:12px;font-size:12px;">
                    </div>
                    <div>
                        <label style="display:block;font-size:14px;font-weight:600;color:#64748b;margin-bottom:12px;">Store Banner</label>
                        <div class="banner-preview" id="banner-preview"></div>
                        <input type="file" name="banner" id="banner-input" accept="image/*" style="margin-top:12px;font-size:12px;">
                    </div>
                </div>
                <div class="form-group"><label>Store Name</label><input type="text" name="merch_name" id="merch_name" required></div>
                <div class="form-group"><label>Store Description</label><textarea name="description" id="description" rows="3"></textarea></div>
                <div class="form-grid">
                    <div class="form-group"><label>Opening Time</label><input type="time" name="opening_time" id="opening_time"></div>
                    <div class="form-group"><label>Closing Time</label><input type="time" name="closing_time" id="closing_time"></div>
                </div>
                <div class="form-group">
                    <label>Delivery Coverage Range (Kilometers)</label>
                    <input type="number" name="delivery_range" id="delivery_range" min="1" max="50">
                </div>
                <div style="margin-top:32px;padding-top:32px;border-top:1px solid #f1f5f9;text-align:right;">
                    <button type="submit" class="btn-save">Update Profile</button>
                </div>
            </form>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script type="module">
        import { requireSeller } from '../js/guard.js';
        import { getSellerByStoreEmail, updateRecord } from '../js/db.js';
        import { renderSellerNav } from '../js/nav-seller.js';
        import { showAlert } from '../js/utils.js';
        import { readFileForFirestore, maxBytesPerDocFile } from '../js/file-upload.js';

        let merchId = null;
        let logoPath = '';
        let bannerPath = '';
        const imageMax = maxBytesPerDocFile(4, 30000);

        function imgSrc(path) {
            if (!path) return '';
            if (path.startsWith('data:') || path.startsWith('http')) return path;
            return '../' + path;
        }

        function setPreview(el, path) {
            el.innerHTML = path
                ? `<img src="${imgSrc(path)}" class="preview-img" alt="">`
                : '<span style="color:#94a3b8;">No image</span>';
        }

        async function init() {
            const auth = await requireSeller();
            if (!auth) return;
            const ctx = await getSellerByStoreEmail(auth.session.user);
            if (!ctx || ctx.seller.Sellr_Status !== 'active') {
                window.location.href = '../login.html';
                return;
            }
            renderSellerNav('profile');
            const { merchant } = ctx;
            merchId = merchant._id;
            logoPath = merchant.Merch_Logo || '';
            bannerPath = merchant.Merch_Banner || '';

            document.title = `Store Profile - ${merchant.Merch_Name || 'PickGo'}`;
            setPreview(document.getElementById('logo-preview'), logoPath);
            setPreview(document.getElementById('banner-preview'), bannerPath);
            document.getElementById('merch_name').value = merchant.Merch_Name || '';
            document.getElementById('description').value = merchant.Merch_Description || '';
            document.getElementById('opening_time').value = merchant.Merch_OpeningTime || '08:00';
            document.getElementById('closing_time').value = merchant.Merch_ClosingTime || '20:00';
            document.getElementById('delivery_range').value = merchant.Merch_DeliveryRange || 5;

            document.getElementById('logo-input').onchange = async (e) => {
                if (e.target.files[0]) {
                    try {
                        logoPath = await readFileForFirestore(e.target, imageMax);
                        setPreview(document.getElementById('logo-preview'), logoPath);
                    } catch (err) {
                        showAlert('alert-box', err.message, 'error');
                    }
                }
            };
            document.getElementById('banner-input').onchange = async (e) => {
                if (e.target.files[0]) {
                    try {
                        bannerPath = await readFileForFirestore(e.target, imageMax);
                        setPreview(document.getElementById('banner-preview'), bannerPath);
                    } catch (err) {
                        showAlert('alert-box', err.message, 'error');
                    }
                }
            };

            document.getElementById('profile-form').onsubmit = async (e) => {
                e.preventDefault();
                try {
                    await updateRecord('merchants', merchId, {
                        Merch_Name: document.getElementById('merch_name').value.trim(),
                        Merch_OpeningTime: document.getElementById('opening_time').value,
                        Merch_ClosingTime: document.getElementById('closing_time').value,
                        Merch_DeliveryRange: Number(document.getElementById('delivery_range').value),
                        Merch_Description: document.getElementById('description').value.trim(),
                        Merch_Logo: logoPath,
                        Merch_Banner: bannerPath,
                    });
                    showAlert('alert-box', 'Store profile updated successfully!', 'success');
                } catch (err) {
                    showAlert('alert-box', err.message || 'Update failed.', 'error');
                }
            };
        }
        init();
    </script>
</body>
</html>
